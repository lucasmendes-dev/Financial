{% extends 'base.html' %}
{% load humanize %}


{% block 'title'%}
    Atualizar Carteira
{% endblock %}

{% block 'content'%}

<div class="form-container">
    <h1 class="title">Editar {{ account }}</h1>
    <div class="form-group">
        <form action="{% url 'accounts:update' 1%}" method="POST">
            {% csrf_token %}
            {{ form.as_p}}
    </div>
    <input class="btn btn-success col-md-12 mt-2 mb-3" type="submit" value="Editar">
</div>

{% endblock %}
