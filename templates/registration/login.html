{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block 'title'%} 
  Entrar
{% endblock %}

{% block 'content' %}

<div class="row">
    <div class="col-md-4 offset-md-4">
        <div class="card auth-card mt-5">
            <div class="card-body">
                <h4 class="card-title text-center">Login</h4>

                <form method="POST">                       
                    {% csrf_token %}       
                    <input type="hidden" name="next" value="{{ next }}">

                    {{ form | crispy }}
                    <button type="submit" class="btn btn-success mt-3 col-md-12">Fazer login</button> 
                  </form>

                <p class="change-form-p mt-2 text-center">Quer criar uma conta?<a href="#"> Clique aqui!</a></p>
            </div>
        </div>
    </div>
</div>


{% endblock %}
