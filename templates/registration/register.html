{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block 'title'%} 
  Cadastrar
{% endblock %}

{% block 'content' %}

<div class="row">
    <div class="col-md-4 offset-md-4">
        <div class="card auth-card mt-5">
            <div class="card-body">
                <h4 class="card-title text-center">Criar Conta</h4>

                <form method="POST">                       
                    {% csrf_token %}                           

                    {{ form | crispy }}
                    <button type="submit" class="btn btn-success mt-3 col-md-12">Cadastrar</button> 
                </form>
                
            </div>
        </div>
    </div>
</div>


{% endblock %}
